version: "3.9"

services:
  app:
    build: .
    container_name: kb-assistant
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # 持久化数据目录
      - ./chroma_data:/app/chroma_data
      - ./uploads:/app/uploads
    # 健康检查（每 30 秒确认服务正常）
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
